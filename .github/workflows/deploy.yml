name: Deploy moon-book

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: moon-book-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build chapter data
        run: node book/site_data/build_chapters_full.mjs
        env:
          VIDEO_BASE_URL: ${{ secrets.VIDEO_BASE_URL }}

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy/book/site_data
          rsync -a --delete site/ deploy/site/
          cp book/site_data/chapters_full.json deploy/book/site_data/chapters_full.json

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: rsync -az --delete deploy/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/u0743505/data/www/luna.sheo.ru/"
