<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Под Огромной Луной — глава</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body data-page="chapter">
    <div class="shell">
      <header class="site-header site-header--compact">
        <p class="eyebrow"><a href="./index.html">Назад к указателю</a></p>
        <h1 id="chapter-page-title">Глава</h1>
      </header>

      <main class="panel chapter-page-panel">
        <article class="chapter-page chapter-page--single">
          <header class="chapter-page__header">
            <p class="eyebrow eyebrow--chapter">Чтение главы</p>
          </header>

          <div class="chapter-page__reading">
            <p id="chapter-page-intro" class="chapter-page__intro"></p>
            <div id="chapter-page-video" class="chapter-page__video" hidden></div>
            <div id="chapter-page-text" class="chapter-page__text" aria-label="Полный текст главы"></div>
          </div>

          <footer class="chapter-page__footer">
            <div id="chapter-page-tags" class="tag-filters chapter-page__tags"></div>

            <nav class="chapter-nav" aria-label="Навигация по главам">
              <a id="prev-chapter" class="chapter-nav__link" href="#">Предыдущая глава</a>
              <a id="next-chapter" class="chapter-nav__link" href="#">Следующая глава</a>
            </nav>
          </footer>
        </article>
      </main>
    </div>
  </body>
</html>
