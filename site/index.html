<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Под Огромной Луной — главы</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body data-page="index">
    <div class="shell">
      <header class="site-header">
        <div class="site-header__copy">
          <p class="eyebrow">Указатель доступа</p>
          <h1>Под Огромной Луной</h1>
          <p class="lede">
            Указатель глав и фильтр по сценическим тегам. Публичные страницы
            скрывают главы с visibility = internal.
          </p>
        </div>
      </header>

      <main class="panel panel--index">
        <section class="toolbar" aria-label="Фильтр по сценическим тегам">
          <div class="toolbar__title">
            <h2>Сценические теги</h2>
            <p id="filter-status">Загрузка...</p>
          </div>
          <div id="tag-filters" class="tag-filters" aria-live="polite"></div>
        </section>

        <section class="chapters" aria-label="Список глав">
          <div class="chapters__title">
            <h2>Главы</h2>
            <p id="chapter-count"></p>
          </div>
          <div id="chapter-list" class="chapter-list" aria-live="polite"></div>
          <p id="empty-state" class="empty-state" hidden>
            Нет глав, подходящих под выбранный тег.
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
